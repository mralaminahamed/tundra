[build]
# Incremental compilation: on for dev, disabled for CI via CARGO_INCREMENTAL=0
incremental = true

[net]
git-fetch-with-cli = false

[registries.crates-io]
protocol = "sparse"

[profile.dev]
incremental = true

[profile.release]
incremental = false
lto = "thin"
codegen-units = 1
strip = "symbols"
