name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, search [existing issues](https://github.com/mralaminahamed/tundra/issues) and check the [changelog](https://github.com/mralaminahamed/tundra/blob/main/CHANGELOG.md).

  - type: input
    id: version
    attributes:
      label: Tundra version
      placeholder: "e.g. v1.0.0 — run: tundra --version"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - tundrad (control plane)
        - tundra-agent
        - tundra CLI
        - Panel (React UI)
        - Installer
        - Plugin host
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug. Include error messages verbatim.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Run with `RUST_LOG=debug` or check `journalctl -u tundrad`. Redact secrets."
      render: text

  - type: input
    id: os
    attributes:
      label: OS / distro
      placeholder: "e.g. Ubuntu 24.04 LTS"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I redacted all secrets, API keys, and passwords from logs
          required: true
