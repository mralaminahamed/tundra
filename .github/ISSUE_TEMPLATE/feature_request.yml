name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? API shape, UI flow, config options — any level of detail is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - tundrad (control plane / API)
        - tundra-agent
        - tundra CLI
        - Panel (React UI)
        - Plugin system
        - Installer
        - Documentation
        - Other

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
