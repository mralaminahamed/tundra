version: 2
updates:

  # Rust workspace
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    groups:
      patch-updates:
        update-types: [patch]
    ignore:
      # Major version bumps require manual review
      - dependency-name: "*"
        update-types: [version-update:semver-major]
    labels: [dependencies, rust]
    commit-message:
      prefix: "chore(deps)"

  # Panel (npm / pnpm)
  - package-ecosystem: npm
    directory: /panel
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    groups:
      patch-updates:
        update-types: [patch]
    ignore:
      - dependency-name: "*"
        update-types: [version-update:semver-major]
    labels: [dependencies, javascript]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
