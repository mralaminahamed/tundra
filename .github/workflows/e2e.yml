name: E2E

on:
  push:
    branches: [main, trunk]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'   # Monday 04:00 UTC — weekly prod-build smoke
  workflow_dispatch:
    inputs:
      multi_server:
        description: 'Run multi-server tests (agent-2 profile)'
        type: boolean
        default: false

env:
  TUNDRAD_URL:   http://localhost:7400
  E2E_BASE_URL:  http://localhost:5173
  TIMEOUT_SECS:  "180"
  PW_PROJECT:    chromium

jobs:
  e2e:
    name: E2E (${{ matrix.shard }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node + pnpm ─────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v6
        with:
          version: "10.33.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: panel/pnpm-lock.yaml

      - name: Install panel deps
        working-directory: panel
        run: pnpm install --frozen-lockfile

      # ── Playwright browsers ─────────────────────────────────────────────────
      - name: Install Playwright + Chromium
        working-directory: panel
        run: pnpm playwright install chromium --with-deps

      # ── Docker layer cache ──────────────────────────────────────────────────
      - uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('docs/09-deployment-bundle/dockerfiles/**', 'Cargo.lock', 'panel/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-buildx-

      # ── Start e2e stack ─────────────────────────────────────────────────────
      - name: Copy e2e .env
        run: cp docs/09-deployment-bundle/e2e/.env.example docs/09-deployment-bundle/e2e/.env

      - name: Build + start stack
        working-directory: docs/09-deployment-bundle/e2e
        run: |
          MULTI_SERVER=${{ github.event.inputs.multi_server == 'true' && '1' || '0' }} \
            scripts/run.sh up

      # ── Run Playwright sharded ───────────────────────────────────────────────
      - name: Run Playwright (${{ matrix.shard }})
        working-directory: panel
        run: |
          pnpm playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }} \
            --reporter=blob,github
        env:
          E2E_BASE_URL: ${{ env.E2E_BASE_URL }}
          TUNDRAD_URL:  ${{ env.TUNDRAD_URL }}
          CI: "true"

      # ── Upload blob report for merge ────────────────────────────────────────
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ strategy.job-index }}
          path: panel/blob-report/
          retention-days: 3

      # ── Tundrad logs on failure ──────────────────────────────────────────────
      - name: Dump tundrad logs
        if: failure()
        working-directory: docs/09-deployment-bundle/e2e
        run: scripts/run.sh logs tundrad || true

      # ── Tear down ──────────────────────────────────────────────────────────
      - name: Tear down stack
        if: always()
        working-directory: docs/09-deployment-bundle/e2e
        run: scripts/run.sh down

  # ── Merge sharded reports ───────────────────────────────────────────────────
  report:
    name: Merge & publish report
    runs-on: ubuntu-24.04
    needs: e2e
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: "10.33.2"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: panel/pnpm-lock.yaml

      - name: Install panel deps
        working-directory: panel
        run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: panel/all-blob-reports
          merge-multiple: true

      - name: Merge reports
        working-directory: panel
        run: pnpm playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: panel/playwright-report/
          retention-days: 14
