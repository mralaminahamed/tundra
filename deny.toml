[graph]
targets = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
]
deny = []
# Allow dual-licensed crates (MIT OR Apache-2.0 is extremely common)
unlicensed = "deny"
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "deepest"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    # Hard ban: no OpenSSL in the dependency tree
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "openssl-probe" },
]

skip = []
skip-tree = []

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
