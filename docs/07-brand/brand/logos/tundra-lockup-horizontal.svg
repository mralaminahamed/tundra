<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tundra — Primary Horizontal Lockup
  Mark + wordmark, optically balanced.
  Mark height = cap-height of wordmark × 1.4 (mark dominates slightly, as it should).
  Spacing between mark and wordmark: equal to wordmark x-height (Inter convention).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-label="Tundra">
  <!-- Mark, scaled to 120×120, positioned left -->
  <g transform="translate(20, 20)">
    <path
      d="M 60 6
         L 68.5 51
         L 86 60
         L 68.5 69
         L 60 114
         L 51.5 69
         L 34 60
         L 51.5 51
         Z"
      fill="#1C1F1A" />
  </g>
  <!-- Wordmark, baseline-aligned to mark vertical center -->
  <text x="170" y="106"
        font-family="'Inter Display', 'Inter', -apple-system, sans-serif"
        font-weight="900"
        font-size="96"
        letter-spacing="-3"
        fill="#1C1F1A">tundra</text>
</svg>
