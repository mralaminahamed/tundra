<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tundra — Stacked Lockup
  Mark above wordmark, both centred. For app icons, square hero panels.
  Author: Al Amin Ahamed (@mralaminahamed)
  Canvas: 320×256.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 256" width="320" height="256" role="img" aria-label="Tundra">
  <title>Tundra</title>

  <!-- Mark, centred horizontally, top zone -->
  <g transform="translate(100, 8) scale(0.5)">
    <path
      d="M120 12 L137 103 L172 120 L137 137 L120 228 L103 137 L68 120 L103 103 Z"
      fill="#1C1F1A"
    />
  </g>

  <!-- Wordmark, centred below mark -->
  <text
    x="160"
    y="230"
    text-anchor="middle"
    font-family="'Inter Display', 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="76"
    letter-spacing="-2.28"
    fill="#1C1F1A"
  >tundra</text>
</svg>
