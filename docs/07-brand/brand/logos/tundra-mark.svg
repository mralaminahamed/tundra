<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tundra Mark — The North Star
  Author: Al Amin Ahamed (@mralaminahamed)
  Construction: 4-pointed star, elongated vertical axis.
  Vertical:Horizontal = 2.077:1 (108px each side / 52px each side, 240×240 viewBox).
  Inner vertices: 17px from center axis, creating a graceful narrow-arm form.
  Single closed path — solid fill only. No strokes, no gradients, no shadows.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Tundra">
  <title>Tundra</title>
  <path
    d="M120 12 L137 103 L172 120 L137 137 L120 228 L103 137 L68 120 L103 103 Z"
    fill="#1C1F1A"
  />
</svg>
