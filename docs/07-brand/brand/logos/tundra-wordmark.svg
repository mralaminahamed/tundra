<?xml version="1.0" encoding="UTF-8"?>
<!--
  Tundra Wordmark — text-only variant
  Typeface: Inter Display Black (900), -0.03em tracking.
  Renders with Inter Display when available; falls back to Inter then system sans.
  Author: Al Amin Ahamed (@mralaminahamed)
  Variants: default (Ink on transparent), use CSS fill override for dark surfaces.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100" role="img" aria-label="tundra">
  <title>tundra</title>
  <text
    x="0"
    y="84"
    font-family="'Inter Display', 'Inter', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="88"
    letter-spacing="-2.64"
    fill="#1C1F1A"
  >tundra</text>
</svg>
