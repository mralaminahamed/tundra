id: "ghost"
name: "Ghost"
description: "Ghost 5 modern blogging and newsletter platform. A professional publishing tool with a clean editor and membership features."
version: "1.0.0"
runtime:
  kind: "nodejs"
  version: "20"
source:
  kind: "skeleton"
build_command: null
start_command: "node current/index.js"
listen_port: 2368
env:
  NODE_ENV: "production"
  url: "https://example.com"
post_create:
  - "npm install ghost-cli -g"
  - "ghost install --no-prompt"
tags: ["nodejs", "ghost", "blog", "cms", "newsletter"]
icon: "ghost"
