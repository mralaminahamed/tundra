id: "laravel"
name: "Laravel"
description: "Laravel 11 PHP web application framework. Includes Artisan, Eloquent ORM, queues, and built-in Auth scaffolding."
version: "1.0.0"
runtime:
  kind: "php"
  version: "8.3"
source:
  kind: "skeleton"
build_command: "composer install --no-dev --optimize-autoloader && php artisan config:cache && php artisan route:cache && php artisan view:cache"
start_command: null
listen_port: null
env:
  APP_ENV: "production"
  APP_DEBUG: "false"
post_create:
  - "composer install --no-dev --optimize-autoloader"
  - "php artisan key:generate"
  - "php artisan migrate --force"
tags: ["php", "laravel", "mvc", "orm"]
icon: "laravel"
