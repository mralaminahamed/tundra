id: "rails"
name: "Ruby on Rails"
description: "Ruby on Rails 8 full-stack web framework. Runs behind Puma with asset pipeline precompilation."
version: "1.0.0"
runtime:
  kind: "ruby"
  version: "3.4"
source:
  kind: "skeleton"
build_command: "bundle install --without development test && bundle exec rake assets:precompile"
start_command: "bundle exec puma -C config/puma.rb"
listen_port: 3000
env:
  RAILS_ENV: "production"
  RAILS_SERVE_STATIC_FILES: "true"
  RAILS_LOG_TO_STDOUT: "true"
post_create:
  - "bundle install"
  - "bundle exec rake db:migrate"
  - "bundle exec rake assets:precompile"
tags: ["ruby", "rails", "mvc", "activerecord"]
icon: "rails"
