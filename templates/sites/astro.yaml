description: "Astro 5 content-focused static site generator with island architecture. Zero JS by default, with optional React/Vue/Svelte islands."
version: "1.0.0"
runtime:
  kind: "static"
  version: ""
source:
  kind: "skeleton"
build_command: "npm run build"
start_command: null
listen_port: null
env:
  NODE_ENV: "production"
post_create:
