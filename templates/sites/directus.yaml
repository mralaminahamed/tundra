id: "directus"
name: "Directus"
description: "Directus 11 open-source data platform and headless CMS. Wraps any SQL database with a powerful REST and GraphQL API plus a no-code admin app."
version: "1.0.0"
runtime:
  kind: "nodejs"
  version: "22"
source:
  kind: "skeleton"
build_command: null
start_command: "npx directus start"
listen_port: 8055
env:
  NODE_ENV: "production"
  HOST: "0.0.0.0"
  PORT: "8055"
  PUBLIC_URL: "https://example.com"
post_create:
  - "npm install"
  - "npx directus bootstrap"
tags: ["nodejs", "directus", "cms", "headless", "api", "database"]
icon: "directus"
