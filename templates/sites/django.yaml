id: "django"
name: "Django"
description: "Django 5.x Python web framework. Runs behind Gunicorn with Whitenoise for static file serving in production."
version: "1.0.0"
runtime:
  kind: "python"
  version: "3.13"
source:
  kind: "skeleton"
build_command: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
start_command: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
listen_port: 8000
env:
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  PYTHONUNBUFFERED: "1"
post_create:
  - "pip install -r requirements.txt"
  - "python manage.py migrate"
  - "python manage.py collectstatic --noinput"
tags: ["python", "django", "web", "orm"]
icon: "django"
