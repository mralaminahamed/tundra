id: "wordpress"
name: "WordPress"
description: "WordPress 6 PHP CMS. The world's most popular content management system with a rich plugin and theme ecosystem."
version: "1.0.0"
runtime:
  kind: "php"
  version: "8.3"
source:
  kind: "skeleton"
build_command: null
start_command: null
listen_port: null
env:
  WP_DEBUG: "false"
  WP_DEBUG_LOG: "false"
post_create:
  - "curl -O https://wordpress.org/latest.tar.gz && tar xzf latest.tar.gz --strip-components=1 && rm latest.tar.gz"
tags: ["php", "wordpress", "cms", "blog"]
icon: "wordpress"
